name: Academic Daily Scholar

on:
  schedule:
    # GitHub Actions uses UTC. 08:00 UTC = 16:00 Asia/Shanghai; 09:00 UTC = 17:00 Asia/Shanghai.
    # Two daily runs reduce the risk of missed scheduled triggers.
    - cron: "0 8 * * *"
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Check configuration
        env:
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          SMTP_SERVER: smtp.163.com
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_AUTH_CODE: ${{ secrets.SMTP_AUTH_CODE }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_FROM_NAME: Academic Daily Scholar
          MAIL_ENABLED: "true"
          TIMEZONE: Asia/Shanghai
          MAX_PAPERS: "5"
          SEARCH_MONTHS: "3"
          PUBLICATION_YEARS: "1"
          PRIMARY_SEARCH_DAYS: "3"
          FALLBACK_SEARCH_YEARS: "3"
          SEEN_STATE_PATH: data/seen_papers.json
          REQUEST_TIMEOUT_SECONDS: "30"
          REQUEST_RETRIES: "3"
          OPENAI_TIMEOUT_SECONDS: "90"
          SSCI_WHITELIST_PATH: data/ssci_whitelist_2026-06.xlsx
          SSCI_FILTER_MODE: strict
        run: python main.py check-config

      - name: Run Academic Daily Scholar
        env:
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          SMTP_SERVER: smtp.163.com
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_AUTH_CODE: ${{ secrets.SMTP_AUTH_CODE }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_FROM_NAME: Academic Daily Scholar
          MAIL_ENABLED: "true"
          TIMEZONE: Asia/Shanghai
          MAX_PAPERS: "5"
          SEARCH_MONTHS: "3"
          PUBLICATION_YEARS: "1"
          PRIMARY_SEARCH_DAYS: "3"
          FALLBACK_SEARCH_YEARS: "3"
          SEEN_STATE_PATH: data/seen_papers.json
          REQUEST_TIMEOUT_SECONDS: "30"
          REQUEST_RETRIES: "3"
          OPENAI_TIMEOUT_SECONDS: "90"
          SSCI_WHITELIST_PATH: data/ssci_whitelist_2026-06.xlsx
          SSCI_FILTER_MODE: strict
        run: python main.py run-once

      - name: Push Markdown report to Obsidian vault
        env:
          OBSIDIAN_VAULT_TOKEN: ${{ secrets.OBSIDIAN_VAULT_TOKEN }}
          OBSIDIAN_VAULT_REPO: Agony888/obsidian-vault
          OBSIDIAN_VAULT_DIR: 文献日报
        run: |
          set -euo pipefail

          if [ -z "${OBSIDIAN_VAULT_TOKEN}" ]; then
            echo "::warning::OBSIDIAN_VAULT_TOKEN is not configured. Skipping Obsidian vault sync."
            exit 0
          fi

          latest_md="$(find daily -maxdepth 1 -type f -name '*.md' | sort | tail -n 1)"
          if [ -z "${latest_md}" ]; then
            echo "::warning::No Markdown report found under daily/. Skipping Obsidian vault sync."
            exit 0
          fi

          report_file="$(basename "${latest_md}")"
          report_date="${report_file%.md}"
          report_year="${report_date:0:4}"
          target_dir="${OBSIDIAN_VAULT_DIR}/${report_year}"
          target_path="${target_dir}/${report_file}"

          git clone --depth 1 "https://x-access-token:${OBSIDIAN_VAULT_TOKEN}@github.com/${OBSIDIAN_VAULT_REPO}.git" obsidian-vault
          cd obsidian-vault
          git checkout -B main
          mkdir -p "${target_dir}"
          cp "../${latest_md}" "${target_path}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${target_path}"

          if git diff --cached --quiet; then
            echo "No Obsidian vault changes to commit."
            exit 0
          fi

          git commit -m "Add academic daily report ${report_date}"
          git push origin HEAD:main

      - name: Upload reports and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: academic-daily-scholar-output
          path: |
            daily/
            logs/
            data/seen_papers.json

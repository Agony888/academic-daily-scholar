name: Academic Daily Scholar

on:
  schedule:
    # GitHub Actions uses UTC. 00:00 UTC = 08:00 Asia/Shanghai.
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Check configuration
        env:
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          SMTP_SERVER: smtp.163.com
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_AUTH_CODE: ${{ secrets.SMTP_AUTH_CODE }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_FROM_NAME: Academic Daily Scholar
          MAIL_ENABLED: "true"
          TIMEZONE: Asia/Shanghai
          MAX_PAPERS: "5"
          SEARCH_MONTHS: "3"
          PUBLICATION_YEARS: "1"
          PRIMARY_SEARCH_DAYS: "3"
          FALLBACK_SEARCH_YEARS: "3"
          SEEN_STATE_PATH: data/seen_papers.json
          REQUEST_TIMEOUT_SECONDS: "30"
          REQUEST_RETRIES: "3"
          OPENAI_TIMEOUT_SECONDS: "90"
          SSCI_WHITELIST_PATH: data/ssci_whitelist_2026-06.xlsx
          SSCI_FILTER_MODE: strict
        run: python main.py check-config

      - name: Run Academic Daily Scholar
        env:
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          SMTP_SERVER: smtp.163.com
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_AUTH_CODE: ${{ secrets.SMTP_AUTH_CODE }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_FROM_NAME: Academic Daily Scholar
          MAIL_ENABLED: "true"
          TIMEZONE: Asia/Shanghai
          MAX_PAPERS: "5"
          SEARCH_MONTHS: "3"
          PUBLICATION_YEARS: "1"
          PRIMARY_SEARCH_DAYS: "3"
          FALLBACK_SEARCH_YEARS: "3"
          SEEN_STATE_PATH: data/seen_papers.json
          REQUEST_TIMEOUT_SECONDS: "30"
          REQUEST_RETRIES: "3"
          OPENAI_TIMEOUT_SECONDS: "90"
          SSCI_WHITELIST_PATH: data/ssci_whitelist_2026-06.xlsx
          SSCI_FILTER_MODE: strict
        run: python main.py run-once

      - name: Upload reports and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: academic-daily-scholar-output
          path: |
            daily/
            logs/
            data/seen_papers.json

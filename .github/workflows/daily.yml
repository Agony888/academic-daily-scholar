name: Academic Daily Scholar

on:
  schedule:
    # GitHub Actions uses UTC. 00:00 UTC = 08:00 Asia/Shanghai.
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Academic Daily Scholar
        env:
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          SMTP_SERVER: smtp.163.com
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_AUTH_CODE: ${{ secrets.SMTP_AUTH_CODE }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_FROM_NAME: Academic Daily Scholar
          MAIL_ENABLED: "true"
          TIMEZONE: Asia/Shanghai
          MAX_PAPERS: "5"
          SEARCH_MONTHS: "3"
          PUBLICATION_YEARS: "1"
          SEEN_STATE_PATH: data/seen_papers.json
          REQUEST_TIMEOUT_SECONDS: "30"
          REQUEST_RETRIES: "3"
          OPENAI_TIMEOUT_SECONDS: "90"
          SSCI_WHITELIST_PATH: data/ssci_whitelist_2026-06.xlsx
          SSCI_FILTER_MODE: strict
        run: python main.py run-once

      - name: Commit generated daily reports and logs
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git pull --rebase origin main || true

          git add daily logs data/seen_papers.json
          if git diff --cached --quiet; then
            echo "No generated files to commit."
          else
            git commit -m "chore: add daily academic report"
            git push || echo "Push skipped because remote changed. Reports were still generated in this run."
          fi
